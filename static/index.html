<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DissipativeValue</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.5rem;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
    }
    h1 { font-size: 0.85rem; color: #666; letter-spacing: 0.12em; text-transform: uppercase; }
    #timestamp { font-size: 0.7rem; color: #444; }
    #dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #333; margin-right: 7px;
      vertical-align: middle;
    }
    #dot.live { background: #4caf50; }

    .panels {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left: raw log ── */
    .panel-log {
      width: 38%;
      min-width: 280px;
      border-right: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-label {
      font-size: 0.65rem;
      color: #444;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.6rem 1rem 0.4rem;
      border-bottom: 1px solid #161616;
      flex-shrink: 0;
    }
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      white-space: pre-wrap;
      line-height: 1.65;
      font-size: 0.78rem;
      color: #888;
    }

    /* ── Right: tree ── */
    .panel-tree {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #tree-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.2rem;
    }
    #tree-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .arc-block {
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      padding: 0.8rem 1rem;
    }
    .arc-meta {
      font-size: 0.62rem;
      color: #3a3a3a;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    #empty-tree { color: #333; font-style: italic; font-size: 0.85rem; padding: 0.5rem 0; }
  </style>
</head>
<body>
  <header>
    <h1><span id="dot"></span>DissipativeValue</h1>
    <div id="timestamp">waiting for output...</div>
  </header>

  <div class="panels">
    <div class="panel-log">
      <div class="panel-label">simulation log</div>
      <div id="output">No output yet.</div>
    </div>
    <div class="panel-tree">
      <div class="panel-label">story paths</div>
      <div id="tree-scroll">
        <div id="tree-container">
          <span id="empty-tree">No arcs completed yet.</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── SVG tree constants ────────────────────────────────────────
    const W           = 660;
    const CX          = 330;
    const A_CX        = 178;   // center of A branch column
    const B_CX        = 482;   // center of B branch column
    const ROOT_HW     = 110;   // root box half-width
    const ROOT_H      = 36;
    const EV_HW       = 88;    // event box half-width
    const EV_H        = 38;
    const BR_HW       = 82;    // branch box half-width
    const BR_H        = 60;
    const GAP_0       = 28;    // root → first event
    const GAP_EV_BR   = 16;    // event → branch boxes
    const GAP_BR_EV   = 20;    // branch boxes → next event

    const C_CHOSEN    = "#e8b840";
    const C_CHOSEN_BG = "#1c1600";
    const C_UNCHOSEN  = "#2a2a2a";
    const C_EV_BG     = "#111127";
    const C_EV_BORDER = "#2e2e66";
    const C_ROOT_BG   = "#111";
    const C_ROOT_BD   = "#333";
    const C_TEXT      = "#bbb";
    const C_DIM       = "#444";
    const C_LINE_ON   = "#e8b840";
    const C_LINE_OFF  = "#1e1e1e";

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
    function trunc(s, n) {
      s = String(s || '');
      return s.length > n ? s.slice(0, n) + '…' : s;
    }

    function buildArcSVG(arc) {
      const events = arc.events || [];
      const n = events.length;
      if (!n) return '';

      // Compute height
      let totalH = 10 + ROOT_H + GAP_0;
      for (let i = 0; i < n; i++) {
        totalH += EV_H + GAP_EV_BR + BR_H;
        if (i < n - 1) totalH += GAP_BR_EV;
      }
      totalH += 24;

      const p = [];   // svg parts
      p.push(`<svg width="${W}" height="${totalH}" xmlns="http://www.w3.org/2000/svg">`);

      // ── Root ──
      const rootY = 10;
      p.push(rect(CX - ROOT_HW, rootY, ROOT_HW * 2, ROOT_H, C_ROOT_BG, C_ROOT_BD, 6));
      p.push(txt(CX, rootY + 13, 'ARC', '#3a3a3a', 8));
      p.push(txt(CX, rootY + 27, trunc(arc.name, 30), C_TEXT, 11));

      let prevCX  = CX;
      let prevBot = rootY + ROOT_H;

      for (let i = 0; i < n; i++) {
        const ev      = events[i];
        const isA     = ev.chosen === 'A';
        const chosenX = isA ? A_CX : B_CX;

        const gap  = (i === 0) ? GAP_0 : GAP_BR_EV;
        const evY  = prevBot + gap;
        const brY  = evY + EV_H + GAP_EV_BR;

        // Line: prev chosen → this event (centered)
        p.push(line(prevCX, prevBot, CX, evY, C_LINE_ON, 1.5));

        // Event node
        p.push(rect(CX - EV_HW, evY, EV_HW * 2, EV_H, C_EV_BG, C_EV_BORDER, 5));
        p.push(txt(CX, evY + 13, ev.phase.toUpperCase(), '#2e2e77', 8));
        p.push(txt(CX, evY + 28, trunc(ev.name, 26), C_TEXT, 10));

        // Lines: event → A branch, event → B branch
        p.push(line(CX, evY + EV_H, A_CX, brY, isA  ? C_LINE_ON : C_LINE_OFF, isA  ? 1.5 : 1, isA  ? '' : '5,4'));
        p.push(line(CX, evY + EV_H, B_CX, brY, !isA ? C_LINE_ON : C_LINE_OFF, !isA ? 1.5 : 1, !isA ? '' : '5,4'));

        // A branch box
        const aIsChosen = isA;
        p.push(branchBox(A_CX, brY, 'A', ev.weight_A, ev.branch_A, aIsChosen));

        // B branch box
        p.push(branchBox(B_CX, brY, 'B', ev.weight_B, ev.branch_B, !isA));

        prevCX  = chosenX;
        prevBot = brY + BR_H;
      }

      p.push('</svg>');
      return p.join('');
    }

    function branchBox(cx, y, label, weight, branchText, chosen) {
      const bg     = chosen ? C_CHOSEN_BG : '#0e0e0e';
      const border = chosen ? C_CHOSEN    : C_UNCHOSEN;
      const tColor = chosen ? C_CHOSEN    : C_DIM;
      const dColor = chosen ? '#c09820'   : '#2e2e2e';
      const x = cx - BR_HW;
      const parts = [];
      parts.push(`<g>`);
      parts.push(`<title>${esc(branchText)}</title>`);
      parts.push(rect(x, y, BR_HW * 2, BR_H, bg, border, 4));
      parts.push(txt(cx, y + 14, `${label}  —  ${weight}%`, tColor, 9));
      parts.push(txt(cx, y + 29, trunc(branchText, 24), dColor, 9));
      if (chosen) {
        parts.push(txt(cx, y + 47, '▶  chosen', C_CHOSEN, 8));
      }
      parts.push('</g>');
      return parts.join('');
    }

    function rect(x, y, w, h, fill, stroke, rx = 4) {
      return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" rx="${rx}"/>`;
    }
    function txt(x, y, text, color, size, anchor = 'middle') {
      return `<text x="${x}" y="${y}" fill="${color}" font-size="${size}" font-family="Courier New,monospace" text-anchor="${anchor}">${esc(text)}</text>`;
    }
    function line(x1, y1, x2, y2, color, width = 1.5, dash = '') {
      return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="${width}" stroke-dasharray="${dash}"/>`;
    }

    // ── Polling ───────────────────────────────────────────────────
    let lastTimestamp = '';
    let lastTreeHash  = '';

    async function pollLog() {
      try {
        const res  = await fetch('/output');
        const data = await res.json();
        if (data.text && data.timestamp !== lastTimestamp) {
          lastTimestamp = data.timestamp;
          document.getElementById('output').textContent = data.text;
          const d = new Date(data.timestamp);
          document.getElementById('timestamp').textContent =
            'Last updated: ' + d.toLocaleString();
          document.getElementById('dot').className = 'live';
        } else if (!data.text) {
          document.getElementById('dot').className = '';
        } else {
          document.getElementById('dot').className = 'live';
        }
      } catch (_) {
        document.getElementById('dot').className = '';
      }
    }

    async function pollTree() {
      try {
        const res  = await fetch('/tree');
        const data = await res.json();
        const hash = JSON.stringify(data);
        if (hash === lastTreeHash) return;
        lastTreeHash = hash;

        const arcs      = data.arcs || [];
        const container = document.getElementById('tree-container');

        if (!arcs.length) {
          container.innerHTML = '<span id="empty-tree">No arcs completed yet.</span>';
          return;
        }

        container.innerHTML = '';
        for (const arc of arcs) {
          const block = document.createElement('div');
          block.className = 'arc-block';

          const meta = document.createElement('div');
          meta.className = 'arc-meta';
          const path = (arc.events || []).map(e => e.chosen).join(' → ');
          meta.textContent = `tick ${arc.concluded_at_tick ?? '?'}  ·  path: ${path || '?'}`;
          block.appendChild(meta);

          const svgDiv = document.createElement('div');
          svgDiv.innerHTML = buildArcSVG(arc);
          block.appendChild(svgDiv);

          if (arc.trigger_reason) {
            const reason = document.createElement('div');
            reason.style.cssText = 'font-size:0.65rem;color:#2e2e2e;margin-top:0.5rem;line-height:1.4;';
            reason.textContent = arc.trigger_reason;
            block.appendChild(reason);
          }

          container.appendChild(block);
        }
      } catch (_) {
        // tree endpoint not ready yet
      }
    }

    pollLog();
    pollTree();
    setInterval(pollLog,  5000);
    setInterval(pollTree, 5000);
  </script>
</body>
</html>
