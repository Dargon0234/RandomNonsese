<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VM Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { font-size: 0.75rem; color: #444; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.5rem; }
    #tick { font-size: 0.7rem; color: #333; margin-bottom: 1.5rem; }
    canvas {
      width: 100%;
      max-width: 900px;
      background: #0d0d14;
      border: 1px solid #1a1a2e;
      border-radius: 4px;
    }
    #arcs {
      margin-top: 1rem;
      font-size: 0.72rem;
      color: #555;
      text-align: center;
      max-width: 900px;
    }
    #legend {
      margin-top: 1.2rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .l { display: flex; align-items: center; gap: 0.4rem; font-size: 0.7rem; color: #555; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    #status { margin-top: 1.5rem; font-size: 0.65rem; color: #2a2a2a; }
  </style>
</head>
<body>
  <h1>Quantum Fluid — Live</h1>
  <div id="tick">waiting for simulation...</div>
  <canvas id="canvas" height="220"></canvas>
  <div id="arcs">no active arcs</div>
  <div id="legend">
    <div class="l"><div class="dot" style="background:#4fc3f7"></div>Realm I (128)</div>
    <div class="l"><div class="dot" style="background:#81c784"></div>Realm II (384)</div>
    <div class="l"><div class="dot" style="background:#ffb74d"></div>Realm III (640)</div>
    <div class="l"><div class="dot" style="background:#f06292"></div>Realm IV (896)</div>
  </div>
  <div id="status">connecting...</div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx    = canvas.getContext("2d");
    const W = 900, H = 220;
    canvas.width = W; canvas.height = H;

    const WELL_COLORS = { 128: "#4fc3f7", 384: "#81c784", 640: "#ffb74d", 896: "#f06292" };

    function smooth(rho, w) {
      return rho.map((_, i) => {
        let s = 0, n = 0;
        for (let j = Math.max(0, i-w); j <= Math.min(rho.length-1, i+w); j++) { s += rho[j]; n++; }
        return s / n;
      });
    }

    function draw(data) {
      ctx.clearRect(0, 0, W, H);

      const rho    = smooth(data.rho, 4);
      const maxR   = Math.max(...rho);
      const PAD_T  = 20, PAD_B = 30;
      const graphH = H - PAD_T - PAD_B;

      // Background grid lines
      ctx.strokeStyle = "#111118";
      ctx.lineWidth   = 1;
      for (let i = 1; i < 4; i++) {
        const y = PAD_T + (graphH / 4) * i;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // Well markers
      for (const well of data.wells) {
        const x   = (well.pos / 1023) * W;
        const col = WELL_COLORS[well.pos] || "#666";
        ctx.strokeStyle = col;
        ctx.globalAlpha = 0.25;
        ctx.lineWidth   = 1;
        ctx.setLineDash([3, 5]);
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;

        // Well label
        ctx.fillStyle   = col;
        ctx.globalAlpha = 0.5;
        ctx.font        = "9px 'Courier New'";
        ctx.fillText(well.name, x + 4, H - 6);
        ctx.globalAlpha = 1;
      }

      // Filled area under the curve
      ctx.beginPath();
      ctx.moveTo(0, PAD_T + graphH);
      for (let i = 0; i < rho.length; i++) {
        const x = (i / (rho.length - 1)) * W;
        const y = PAD_T + graphH - (rho[i] / maxR) * graphH * 0.9;
        i === 0 ? ctx.lineTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.lineTo(W, PAD_T + graphH);
      ctx.closePath();
      const grad = ctx.createLinearGradient(0, PAD_T, 0, PAD_T + graphH);
      grad.addColorStop(0,   "rgba(80, 140, 255, 0.4)");
      grad.addColorStop(1,   "rgba(80, 140, 255, 0.02)");
      ctx.fillStyle   = grad;
      ctx.fill();

      // Curve line
      ctx.beginPath();
      ctx.strokeStyle = "#6699ff";
      ctx.lineWidth   = 2;
      for (let i = 0; i < rho.length; i++) {
        const x = (i / (rho.length - 1)) * W;
        const y = PAD_T + graphH - (rho[i] / maxR) * graphH * 0.9;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Center of mass dot
      let center = 0;
      for (let i = 0; i < rho.length; i++) center += i * rho[i];
      const totalRho = rho.reduce((a, b) => a + b, 0);
      center /= totalRho;
      const cx = (center / 1023) * W;
      const cy = PAD_T + graphH - (rho[Math.round(center)] / maxR) * graphH * 0.9;
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, Math.PI * 2);
      ctx.fillStyle   = "#ffffff";
      ctx.globalAlpha = 0.9;
      ctx.fill();
      ctx.globalAlpha = 1;

      // Arc dots on curve
      for (const arc of data.arcs) {
        const x   = (arc.grid_pos / 1023) * W;
        const idx = Math.min(Math.round(arc.grid_pos), rho.length - 1);
        const y   = PAD_T + graphH - (rho[idx] / maxR) * graphH * 0.9;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle   = "#ffcc00";
        ctx.globalAlpha = 0.85;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    async function poll() {
      try {
        const res  = await fetch("/vm");
        const data = await res.json();
        if (data.rho && data.rho.length > 0) {
          draw(data);
          document.getElementById("tick").textContent =
            `tick ${data.tick}  ·  center: ${Math.round(data.rho.reduce((s,v,i) => s + i*v, 0) / data.rho.reduce((s,v) => s+v, 0))}`;
          document.getElementById("arcs").textContent =
            data.arcs && data.arcs.length > 0
              ? "active: " + data.arcs.map(a => a.name).join("  ·  ")
              : "no active arcs";
          document.getElementById("status").textContent = "live";
        }
      } catch(e) {
        document.getElementById("status").textContent = "waiting...";
      }
    }

    poll();
    setInterval(poll, 1000);
  </script>
</body>
</html>
