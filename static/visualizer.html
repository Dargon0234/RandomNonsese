<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>entities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #12121e;
      color: #ccc;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.55rem 1.2rem;
      border-bottom: 1px solid #0f0f1c;
      flex-shrink: 0;
    }
    .h-chip {
      font-size: 0.58rem;
      border: 1px solid #1a1a28;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.1em;
      transition: color 1s ease, border-color 1s ease;
    }
    #h-time  { font-size: 0.58rem; color: #1e1e2e; letter-spacing: 0.1em; transition: color 2s ease; margin: 0 auto; }
    #h-tick  { font-size: 0.58rem; color: #161622; }

    #world-wrap { flex: 1; position: relative; min-height: 0; }
    #world { display: block; width: 100%; height: 100%; }

    /* Stats bars */
    #stats-row {
      display: flex;
      border-top: 1px solid #0f0f1c;
      flex-shrink: 0;
    }
    .stats-half {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.38rem 1.2rem;
      border-right: 1px solid #0f0f1c;
    }
    .stats-half:last-child { border-right: none; }
    .drive-chip {
      font-size: 0.48rem;
      letter-spacing: 0.12em;
      padding: 2px 7px;
      border: 1px solid #1a1a28;
      border-radius: 2px;
      flex-shrink: 0;
      text-transform: uppercase;
      transition: color 0.6s ease, border-color 0.6s ease;
      color: #252535;
    }
    .bars-group {
      display: flex;
      gap: 0.5rem;
      flex: 1;
    }
    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
    }
    .bar-label {
      font-size: 0.38rem;
      letter-spacing: 0.07em;
      color: #3a3a55;
      text-transform: uppercase;
    }
    .bar-val {
      font-size: 0.38rem;
      color: #3a3a55;
      min-width: 1.8em;
      text-align: right;
    }
    .bar-track {
      width: 100%;
      height: 5px;
      background: #1a1a28;
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      width: 100%;
    }

    /* Speech between entities */
    #speech-bar {
      padding: 0.4rem 1.2rem;
      border-top: 1px solid #0f0f1c;
      font-size: 0.65rem;
      color: #1e1e2e;
      min-height: 1.8rem;
      flex-shrink: 0;
      letter-spacing: 0.06em;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    #speech-label { color: #252535; font-size: 0.52rem; flex-shrink: 0; }
    #speech-text  { font-style: italic; transition: color 1.5s ease; }

    /* Ask row — side by side */
    #ask-row {
      display: flex;
      border-top: 1px solid #0f0f1c;
      flex-shrink: 0;
    }
    .ask-half {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1.2rem;
      border-right: 1px solid #0f0f1c;
    }
    .ask-half:last-child { border-right: none; }
    .ask-label {
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      flex-shrink: 0;
    }
    .ask-input {
      flex: 1;
      background: #0d0d18;
      border: 1px solid #1a1a2a;
      border-radius: 3px;
      color: #666;
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      padding: 0.3rem 0.6rem;
      outline: none;
      transition: border-color 0.3s ease, color 0.3s ease;
    }
    .ask-input:focus { border-color: #2a2a44; color: #999; }
    .ask-btn {
      background: none;
      border: 1px solid #1a1a2a;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 0.6rem;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    .ask-btn:hover { color: #666; border-color: #333; }

    /* Reply row — side by side */
    #reply-row {
      display: flex;
      border-top: 1px solid #0a0a14;
      flex-shrink: 0;
    }
    .reply-half {
      flex: 1;
      padding: 0.4rem 1.2rem;
      font-size: 0.68rem;
      color: #1e1e2e;
      min-height: 1.8rem;
      line-height: 1.5;
      border-right: 1px solid #0a0a14;
    }
    .reply-half:last-child { border-right: none; }
    .reply-q { color: #1e1e2e; margin-right: 0.5rem; }
    .reply-a { font-style: italic; }
  </style>
</head>
<body>

  <header>
    <span class="h-chip" id="h-chip1" style="color:#9090bb88;border-color:#9090bb33">entity 1</span>
    <span id="h-time">—</span>
    <span class="h-chip" id="h-chip2" style="color:#70b88888;border-color:#70b88833">entity 2</span>
    <span id="h-tick">tick 0000</span>
  </header>

  <div id="world-wrap">
    <canvas id="world"></canvas>
  </div>

  <div id="stats-row">
    <div class="stats-half">
      <span class="drive-chip" id="drive1">—</span>
      <div class="bars-group">
        <div class="bar-col">
          <span class="bar-label">hun <span class="bar-val" id="val-hun1">—</span></span>
          <div class="bar-track"><div class="bar-fill" id="bar-hun1" style="background:#cc884455"></div></div>
        </div>
        <div class="bar-col">
          <span class="bar-label">slp <span class="bar-val" id="val-slp1">—</span></span>
          <div class="bar-track"><div class="bar-fill" id="bar-slp1" style="background:#4466aa55"></div></div>
        </div>
      </div>
    </div>
    <div class="stats-half">
      <span class="drive-chip" id="drive2">—</span>
      <div class="bars-group">
        <div class="bar-col">
          <span class="bar-label">hun <span class="bar-val" id="val-hun2">—</span></span>
          <div class="bar-track"><div class="bar-fill" id="bar-hun2" style="background:#cc884455"></div></div>
        </div>
        <div class="bar-col">
          <span class="bar-label">slp <span class="bar-val" id="val-slp2">—</span></span>
          <div class="bar-track"><div class="bar-fill" id="bar-slp2" style="background:#4466aa55"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="speech-bar">
    <span id="speech-label">—</span>
    <span id="speech-text"></span>
  </div>

  <div id="ask-row">
    <div class="ask-half">
      <span class="ask-label" style="color:#9090bb66">entity 1</span>
      <input class="ask-input" id="ask-input1" type="text" placeholder="say something..." maxlength="120" autocomplete="off"/>
      <button class="ask-btn" id="ask-btn1" style="color:#9090bb55;border-color:#9090bb33">ask</button>
    </div>
    <div class="ask-half">
      <span class="ask-label" style="color:#70b88866">entity 2</span>
      <input class="ask-input" id="ask-input2" type="text" placeholder="say something..." maxlength="120" autocomplete="off"/>
      <button class="ask-btn" id="ask-btn2" style="color:#70b88855;border-color:#70b88833">ask</button>
    </div>
  </div>

  <div id="reply-row">
    <div class="reply-half">
      <span class="reply-q" id="reply-q1"></span><span class="reply-a" id="reply-a1"></span>
    </div>
    <div class="reply-half">
      <span class="reply-q" id="reply-q2"></span><span class="reply-a" id="reply-a2"></span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('world');
    const ctx    = canvas.getContext('2d');
    const wrap   = document.getElementById('world-wrap');

    const E1_COLOR = '#9090bb';
    const E2_COLOR = '#70b888';

    const DRIVE_COLORS = {
      rest:    '#4fc3f7',
      explore: '#44bbaa',
      decay:   '#aa4466',
      restore: '#9c8fd4',
      consume: '#81c784',
    };

    // Room furniture positions (normalized)
    const ZONES = {
      rest:    { nx: 0.14, ny: 0.60 },
      decay:   { nx: 0.72, ny: 0.78 },
      restore: { nx: 0.25, ny: 0.28 },
      consume: { nx: 0.82, ny: 0.30 },
    };

    // Drive wander zones (center + radius in normalized coords)
    const ZONE_MAP = {
      rest:    { cx: 0.14, cy: 0.60, r: 0.10 },
      explore: { cx: 0.50, cy: 0.50, r: 0.20 },
      decay:   { cx: 0.72, cy: 0.78, r: 0.11 },
      restore: { cx: 0.25, cy: 0.28, r: 0.10 },
      consume: { cx: 0.82, cy: 0.30, r: 0.11 },
    };

    // Entity 1 state
    let e1x = 0.35, e1y = 0.5,  e1tx = 0.35, e1ty = 0.5;
    let e1wanderTX = 0.35, e1wanderTY = 0.5, e1timer = 0;
    let e1Drive = 'explore';
    let e1TimeOfDay = 'dawn';
    const trail1 = [];

    // Entity 2 state
    let e2x = 0.65, e2y = 0.5,  e2tx = 0.65, e2ty = 0.5;
    let e2wanderTX = 0.65, e2wanderTY = 0.5, e2timer = 0;
    let e2Drive = 'explore';
    let e2TimeOfDay = 'dawn';
    const trail2 = [];

    const TRAIL_MAX = 28;
    const LERP = 0.018;

    function newWander(entity, drive) {
      const zone = ZONE_MAP[drive] || ZONE_MAP.explore;
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * zone.r;
      const x = Math.max(0.08, Math.min(0.92, zone.cx + Math.cos(angle) * r));
      const y = Math.max(0.12, Math.min(0.90, zone.cy + Math.sin(angle) * r));
      if (entity === 1) { e1wanderTX = x; e1wanderTY = y; }
      else              { e2wanderTX = x; e2wanderTY = y; }
    }

    function updateTargets() {
      e1timer--;
      if (e1timer <= 0) { newWander(1, e1Drive); e1timer = 90 + Math.floor(Math.random() * 100); }
      e1tx = e1wanderTX; e1ty = e1wanderTY;

      e2timer--;
      if (e2timer <= 0) { newWander(2, e2Drive); e2timer = 90 + Math.floor(Math.random() * 100); }
      e2tx = e2wanderTX; e2ty = e2wanderTY;
    }

    // Drive-specific per-second drain rates (Python per-tick rates / 3.0s tick)
    // Passive is added separately: sleep -0.033/s, hunger -0.017/s
    // Per-second hunger rates (passive drain baked in)
    const HUNGER_PER_SEC = {
      rest: -0.33, explore: -0.33, decay: -0.33, restore: -0.33, consume: +0.50,
    };
    // Sleep drain per second varies by time of day (day=fast, night=slow)
    // rest drive adds +10/tick / 3s = +3.33/sec on top of passive
    const SLEEP_PASSIVE = { day: -4.0 / 3.0, night: -0.3 / 3.0 };
    const SLEEP_REST_BONUS = 10.0 / 3.0;

    // Displayed bar values — drift smoothly, snap to server on tick
    const dv1 = { hunger: 55, sleep: 65 };
    const dv2 = { hunger: 55, sleep: 65 };

    function renderBars(dv, idx) {
      const clamp  = v => Math.max(0, Math.min(100, v));
      const setBar = (id, val, color) => {
        const el = document.getElementById(id + idx);
        if (el) { el.style.width = clamp(val) + '%'; el.style.background = color; }
        const ve = document.getElementById('val-' + id.replace('bar-', '') + idx);
        if (ve) ve.textContent = Math.round(clamp(val));
      };
      setBar('bar-hun', dv.hunger, '#cc8844aa');
      setBar('bar-slp', dv.sleep,  '#4466aaaa');
    }

    const DAY_PHASES = ['morning', 'noon', 'dusk'];
    function applyDrain() {
      const dt = 0.1;
      [
        { dv: dv1, drive: e1Drive, tod: e1TimeOfDay },
        { dv: dv2, drive: e2Drive, tod: e2TimeOfDay },
      ].forEach(({ dv, drive, tod }) => {
        const hRate = HUNGER_PER_SEC[drive] ?? -0.33;
        const passive = DAY_PHASES.includes(tod) ? SLEEP_PASSIVE.day : SLEEP_PASSIVE.night;
        const sRate = passive + (drive === 'rest' ? SLEEP_REST_BONUS : 0);
        dv.hunger = Math.max(0, Math.min(100, dv.hunger + hRate * dt));
        dv.sleep  = Math.max(0, Math.min(100, dv.sleep  + sRate * dt));
      });
      renderBars(dv1, 1);
      renderBars(dv2, 2);
    }

    setInterval(applyDrain, 100);

    function updateBars(d, idx) {
      const drive = d.drive || 'explore';
      const dc    = DRIVE_COLORS[drive] || '#444466';
      const chip  = document.getElementById('drive' + idx);
      chip.textContent       = drive;
      chip.style.color       = dc + 'aa';
      chip.style.borderColor = dc + '44';

      // Snap display values and time-of-day to authoritative server values
      const dv = idx === 1 ? dv1 : dv2;
      if (d.hunger      != null) dv.hunger = d.hunger;
      if (d.sleep       != null) dv.sleep  = d.sleep;
      if (d.time_of_day != null) { if (idx === 1) e1TimeOfDay = d.time_of_day; else e2TimeOfDay = d.time_of_day; }
    }

    function resize() {
      canvas.width  = wrap.clientWidth;
      canvas.height = wrap.clientHeight;
    }
    new ResizeObserver(resize).observe(wrap);
    resize();

    // ── Room drawing ─────────────────────────────────────────────
    function drawRoom() {
      const W = canvas.width, H = canvas.height;
      ctx.fillStyle = '#16162a'; ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = '#1e1e32'; ctx.lineWidth = 1;
      for (let i = 1; i < 10; i++) {
        const y = (H / 10) * i;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
      const wallW = W * 0.045;
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, wallW, H);
      ctx.fillRect(W - wallW, 0, wallW, H);
      ctx.strokeStyle = '#252540'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, H * 0.05); ctx.lineTo(W, H * 0.05); ctx.stroke();
      ctx.strokeStyle = '#20203a';
      ctx.beginPath(); ctx.moveTo(0, H * 0.94); ctx.lineTo(W, H * 0.94); ctx.stroke();
    }

    function drawBed() {
      const W = canvas.width, H = canvas.height;
      const cx = ZONES.rest.nx * W, cy = ZONES.rest.ny * H;
      const bw = W * 0.11, bh = H * 0.18;
      ctx.fillStyle = '#4fc3f714'; ctx.strokeStyle = '#4fc3f728'; ctx.lineWidth = 1;
      roundRect(cx - bw/2, cy - bh/2, bw, bh, 3);
      ctx.fillStyle = '#4fc3f71e'; ctx.strokeStyle = '#4fc3f72a';
      roundRect(cx - bw/2 + bw*0.08, cy - bh/2 + bh*0.1, bw*0.38, bh*0.35, 2);
      ctx.strokeStyle = '#4fc3f718'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx - bw/2, cy + bh*0.05); ctx.lineTo(cx + bw/2, cy + bh*0.05);
      ctx.stroke();
    }

    function drawShelf() {
      const W = canvas.width, H = canvas.height;
      const cx = ZONES.consume.nx * W, cy = ZONES.consume.ny * H;
      const sw = W * 0.09, sh = H * 0.03;
      for (let i = 0; i < 3; i++) {
        const y = cy - sh*3 + i * (sh + H*0.05);
        ctx.fillStyle = '#81c78416'; ctx.strokeStyle = '#81c78428'; ctx.lineWidth = 1;
        roundRect(cx - sw/2, y, sw, sh, 1);
        const ic = 2 + i;
        for (let j = 0; j < ic; j++) {
          const ix = cx - sw/2 + sw * (0.1 + j * (0.8 / ic));
          ctx.fillStyle = '#81c78422'; ctx.fillRect(ix, y - H*0.025, sw*0.12, H*0.025);
        }
      }
    }

    function drawDecayCorner() {
      const W = canvas.width, H = canvas.height;
      const cx = ZONES.decay.nx * W, cy = ZONES.decay.ny * H;
      ctx.strokeStyle = '#aa446625'; ctx.lineWidth = 1;
      for (const [x1,y1,x2,y2] of [[-18,-12,8,-4],[-8,-20,14,-8],[-22,2,4,10],[-4,-16,18,2],[2,-6,-14,8],[-16,10,6,18]]) {
        ctx.beginPath(); ctx.moveTo(cx+x1, cy+y1); ctx.lineTo(cx+x2, cy+y2); ctx.stroke();
      }
      const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28);
      grd.addColorStop(0, '#aa446612'); grd.addColorStop(1, '#aa446600');
      ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(cx, cy, 28, 0, Math.PI*2); ctx.fill();
    }

    function drawRestorePool() {
      const W = canvas.width, H = canvas.height;
      const cx = ZONES.restore.nx * W, cy = ZONES.restore.ny * H;
      const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 32);
      grd.addColorStop(0, '#9c8fd414'); grd.addColorStop(1, '#9c8fd400');
      ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(cx, cy, 32, 0, Math.PI*2); ctx.fill();
      for (let i = 3; i >= 1; i--) {
        ctx.beginPath(); ctx.arc(cx, cy, i * 7, 0, Math.PI*2);
        ctx.strokeStyle = '#9c8fd4' + (i === 1 ? '35' : '20'); ctx.lineWidth = 1; ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2);
      ctx.fillStyle = '#9c8fd444'; ctx.fill();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
      ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
      ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
      ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }

    function drawTrail(trail, col) {
      for (let i = 0; i < trail.length; i++) {
        const alpha = Math.floor((i / trail.length) ** 2 * 60).toString(16).padStart(2, '0');
        ctx.beginPath(); ctx.arc(trail[i].x, trail[i].y, 1.5, 0, Math.PI*2);
        ctx.fillStyle = col + alpha; ctx.fill();
      }
    }

    function drawEntity(px, py, col) {
      const grd = ctx.createRadialGradient(px, py, 0, px, py, 24);
      grd.addColorStop(0, col + '3a'); grd.addColorStop(1, col + '00');
      ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(px, py, 24, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px, py, 4.5, 0, Math.PI*2); ctx.fillStyle = col; ctx.fill();
      ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI*2); ctx.fillStyle = '#ffffff60'; ctx.fill();
    }

    // ── Day / night ──────────────────────────────────────────────
    const CYCLE_MS = 4 * 60 * 1000;
    const SKY_STOPS = [
      { t: 0.00, r:255, g:120, b: 60, intensity: 0.55, label: 'dawn'    },
      { t: 0.20, r:255, g:200, b:120, intensity: 0.90, label: 'morning' },
      { t: 0.35, r:180, g:200, b:255, intensity: 1.00, label: 'noon'    },
      { t: 0.55, r:255, g:140, b: 60, intensity: 0.75, label: 'dusk'    },
      { t: 0.70, r:120, g: 60, b:140, intensity: 0.30, label: 'evening' },
      { t: 0.85, r: 20, g: 20, b: 60, intensity: 0.05, label: 'night'   },
      { t: 1.00, r:255, g:120, b: 60, intensity: 0.55, label: 'dawn'    },
    ];

    function getSky() {
      const t = (Date.now() % CYCLE_MS) / CYCLE_MS;
      let prev = SKY_STOPS[SKY_STOPS.length - 2], next = SKY_STOPS[SKY_STOPS.length - 1];
      for (let i = 0; i < SKY_STOPS.length - 1; i++) {
        if (t >= SKY_STOPS[i].t && t < SKY_STOPS[i+1].t) { prev = SKY_STOPS[i]; next = SKY_STOPS[i+1]; break; }
      }
      const f = (t - prev.t) / (next.t - prev.t || 1);
      return {
        r: Math.round(prev.r + (next.r - prev.r) * f),
        g: Math.round(prev.g + (next.g - prev.g) * f),
        b: Math.round(prev.b + (next.b - prev.b) * f),
        intensity: prev.intensity + (next.intensity - prev.intensity) * f,
        t,
        label: t < 0.20 ? 'dawn' : t < 0.35 ? 'morning' : t < 0.55 ? 'noon' :
               t < 0.70 ? 'dusk' : t < 0.85 ? 'evening' : 'night',
      };
    }

    function drawAmbientOverlay(sky) {
      const W = canvas.width, H = canvas.height;
      const night = 1 - sky.intensity;
      if (night > 0.1) { ctx.fillStyle = `rgba(0,0,12,${night * 0.55})`; ctx.fillRect(0,0,W,H); }
      if (sky.intensity > 0.4 && sky.t < 0.55) {
        const warm = (sky.intensity - 0.4) * 0.12;
        ctx.fillStyle = `rgba(${sky.r},${sky.g*0.7|0},${sky.b*0.3|0},${warm})`; ctx.fillRect(0,0,W,H);
      }
    }

    function drawWindowWithSky(sky) {
      const W = canvas.width, H = canvas.height;
      const cx = W * 0.5, cy = H * 0.12;
      const ww = W * 0.12, wh = H * 0.10;
      const { r, g, b, intensity, t } = sky;

      ctx.globalAlpha = Math.min(1, intensity * 0.5 + 0.08);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(cx - ww/2 + 1, cy - wh/2 + 1, ww - 2, wh - 2);
      ctx.globalAlpha = 1;

      const isDay = t < 0.70;
      const bodyT = isDay ? t / 0.70 : (t - 0.70) / 0.30;
      const bodyX = (cx - ww/2 + 4) + (ww - 8) * bodyT;
      const bodyY = (cy + wh/2 - 4) - (wh - 8) * Math.sin(bodyT * Math.PI);

      if (isDay) {
        const grd = ctx.createRadialGradient(bodyX, bodyY, 0, bodyX, bodyY, 12);
        grd.addColorStop(0, `rgba(${r},${g},${b},${intensity})`);
        grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(bodyX, bodyY, 12, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(bodyX, bodyY, 4, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,240,200,${intensity * 0.9})`; ctx.fill();
      } else {
        const moonA = (1 - intensity) * 0.7;
        ctx.beginPath(); ctx.arc(bodyX, bodyY, 4, 0, Math.PI*2);
        ctx.fillStyle = `rgba(200,210,255,${moonA})`; ctx.fill();
        for (const [sx, sy] of [[0.15,0.2],[0.75,0.15],[0.35,0.7],[0.85,0.55],[0.55,0.35]]) {
          ctx.beginPath(); ctx.arc(cx - ww/2 + ww*sx, cy - wh/2 + wh*sy, 1, 0, Math.PI*2);
          ctx.fillStyle = `rgba(200,210,255,${moonA * 0.8})`; ctx.fill();
        }
      }

      const spillR = ww * (1.5 + intensity * 1.5);
      const grd = ctx.createRadialGradient(cx, cy + wh/2, 0, cx, cy + wh/2, spillR);
      grd.addColorStop(0, `rgba(${r},${g},${b},${intensity * 0.18})`);
      grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(cx, cy + wh/2, spillR, 0, Math.PI*2); ctx.fill();

      ctx.strokeStyle = '#2e2e50'; ctx.lineWidth = 1.5;
      ctx.strokeRect(cx - ww/2, cy - wh/2, ww, wh);
      ctx.beginPath();
      ctx.moveTo(cx, cy - wh/2); ctx.lineTo(cx, cy + wh/2);
      ctx.moveTo(cx - ww/2, cy); ctx.lineTo(cx + ww/2, cy);
      ctx.stroke();
    }

    // ── Thought system (two independent streams) ─────────────────
    const T_FADEIN = 60, T_HOLD = 1200, T_FADEOUT = 240;

    function makeTought() {
      return { text: "", tick: -1, phase: 0, age: 0, alpha: 0 };
    }
    let t1 = makeTought(), t2 = makeTought();

    function triggerThought(state, text, tick) {
      state.text = text; state.tick = tick; state.phase = 1; state.age = 0; state.alpha = 0;
    }

    function stepThought(state) {
      if (state.phase === 0) return;
      state.age++;
      if (state.phase === 1) {
        state.alpha = state.age / T_FADEIN;
        if (state.age >= T_FADEIN) { state.phase = 2; state.age = 0; }
      } else if (state.phase === 2) {
        state.alpha = 1.0;
        if (state.age >= T_HOLD) { state.phase = 3; state.age = 0; }
      } else if (state.phase === 3) {
        state.alpha = 1.0 - state.age / T_FADEOUT;
        if (state.age >= T_FADEOUT) { state.phase = 0; state.alpha = 0; state.text = ""; }
      }
    }

    function drawThought(state, col, centerX, W, H) {
      if (!state.text || state.alpha <= 0) return;
      const words = state.text.split(' ');
      const lines = []; let line = '';
      for (const w of words) {
        if ((line + ' ' + w).trim().length > 38) { lines.push(line.trim()); line = w; }
        else line = (line + ' ' + w).trim();
      }
      if (line) lines.push(line);
      ctx.globalAlpha = state.alpha * 0.75;
      ctx.font = "11px 'Courier New'";
      ctx.textAlign = 'center';
      ctx.fillStyle = col;
      lines.forEach((l, i) => ctx.fillText(l, centerX, H * 0.10 + i * 17));
      ctx.globalAlpha = 1;
    }

    // ── Animation loop ───────────────────────────────────────────
    let frame = 0;
    function animate() {
      frame++;
      const W = canvas.width, H = canvas.height;

      updateTargets();
      e1x += (e1tx - e1x) * LERP; e1y += (e1ty - e1y) * LERP;
      e2x += (e2tx - e2x) * LERP; e2y += (e2ty - e2y) * LERP;

      if (frame % 3 === 0) {
        trail1.push({ x: e1x * W, y: e1y * H }); if (trail1.length > TRAIL_MAX) trail1.shift();
        trail2.push({ x: e2x * W, y: e2y * H }); if (trail2.length > TRAIL_MAX) trail2.shift();
      }

      const sky = getSky();
      drawRoom();
      drawAmbientOverlay(sky);
      drawWindowWithSky(sky);
      drawBed(); drawShelf(); drawDecayCorner(); drawRestorePool();

      const timeEl = document.getElementById('h-time');
      if (timeEl && timeEl.textContent !== sky.label) {
        timeEl.textContent = sky.label;
        const sc = `rgb(${sky.r},${sky.g},${sky.b})`;
        timeEl.style.color = sky.intensity > 0.3 ? sc : '#2a2a44';
      }

      drawTrail(trail1, E1_COLOR);
      drawTrail(trail2, E2_COLOR);
      drawEntity(e1x * W, e1y * H, E1_COLOR);
      drawEntity(e2x * W, e2y * H, E2_COLOR);

      stepThought(t1); stepThought(t2);
      drawThought(t1, E1_COLOR, W * 0.28, W, H);
      drawThought(t2, E2_COLOR, W * 0.72, W, H);

      requestAnimationFrame(animate);
    }
    animate();

    // ── Polling ──────────────────────────────────────────────────
    let lastTick1 = -1, lastTick2 = -1;

    async function poll() {
      try {
        const [r1, r2] = await Promise.all([fetch('/npc'), fetch('/npc2')]);
        const [d1, d2] = await Promise.all([r1.json(), r2.json()]);

        if (d1.tick && d1.tick !== lastTick1) {
          lastTick1 = d1.tick;
          document.getElementById('h-tick').textContent = 'tick ' + String(d1.tick).padStart(4,'0');
          if (d1.drive && d1.drive !== e1Drive) {
            e1Drive = d1.drive; newWander(1, e1Drive); e1timer = 0;
          }
          updateBars(d1, 1);
        }
        if (d2.tick && d2.tick !== lastTick2) {
          lastTick2 = d2.tick;
          if (d2.drive && d2.drive !== e2Drive) {
            e2Drive = d2.drive; newWander(2, e2Drive); e2timer = 0;
          }
          updateBars(d2, 2);
        }
      } catch(_) {}
    }

    let thoughtTick1 = -1, thoughtTick2 = -1;
    async function pollThoughts() {
      try {
        const [r1, r2] = await Promise.all([fetch('/thought'), fetch('/thought2')]);
        const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
        if (d1.tick && d1.tick !== thoughtTick1 && d1.text) { thoughtTick1 = d1.tick; triggerThought(t1, d1.text, d1.tick); }
        if (d2.tick && d2.tick !== thoughtTick2 && d2.text) { thoughtTick2 = d2.tick; triggerThought(t2, d2.text, d2.tick); }
      } catch(_) {}
    }

    let lastSpeechTick1 = -1, lastSpeechTick2 = -1;
    async function pollSpeech() {
      try {
        const res  = await fetch('/speech');
        const data = await res.json();
        const s1 = data.from_1 || {}, s2 = data.from_2 || {};

        const labelEl = document.getElementById('speech-label');
        const textEl  = document.getElementById('speech-text');

        if (s1.tick && s1.tick !== lastSpeechTick1 && s1.text) {
          lastSpeechTick1 = s1.tick;
          labelEl.textContent = '1 → 2';
          labelEl.style.color = E1_COLOR + '88';
          textEl.textContent  = '"' + s1.text + '"';
          textEl.style.color  = E1_COLOR + '99';
        } else if (s2.tick && s2.tick !== lastSpeechTick2 && s2.text) {
          lastSpeechTick2 = s2.tick;
          labelEl.textContent = '2 → 1';
          labelEl.style.color = E2_COLOR + '88';
          textEl.textContent  = '"' + s2.text + '"';
          textEl.style.color  = E2_COLOR + '99';
        }
      } catch(_) {}
    }

    let lastRespTick1 = -1, lastRespTick2 = -1;
    async function pollResponses() {
      try {
        const [r1, r2] = await Promise.all([fetch('/response'), fetch('/response2')]);
        const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
        if (d1.tick && d1.tick !== lastRespTick1 && d1.response) {
          lastRespTick1 = d1.tick;
          document.getElementById('reply-q1').textContent = '"' + d1.question + '"';
          document.getElementById('reply-a1').textContent = '  ' + d1.response;
          document.getElementById('reply-a1').style.color = E1_COLOR + '99';
        }
        if (d2.tick && d2.tick !== lastRespTick2 && d2.response) {
          lastRespTick2 = d2.tick;
          document.getElementById('reply-q2').textContent = '"' + d2.question + '"';
          document.getElementById('reply-a2').textContent = '  ' + d2.response;
          document.getElementById('reply-a2').style.color = E2_COLOR + '99';
        }
      } catch(_) {}
    }

    // ── Ask ──────────────────────────────────────────────────────
    async function sendQ(endpoint, q) {
      await fetch(endpoint, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question: q}),
      });
    }

    document.getElementById('ask-btn1').addEventListener('click', () => {
      const q = document.getElementById('ask-input1').value.trim();
      if (!q) return;
      sendQ('/ask', q);
      document.getElementById('reply-q1').textContent = q;
      document.getElementById('reply-a1').textContent = '  ...';
      document.getElementById('ask-input1').value = '';
    });
    document.getElementById('ask-input1').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('ask-btn1').click();
    });

    document.getElementById('ask-btn2').addEventListener('click', () => {
      const q = document.getElementById('ask-input2').value.trim();
      if (!q) return;
      sendQ('/ask2', q);
      document.getElementById('reply-q2').textContent = q;
      document.getElementById('reply-a2').textContent = '  ...';
      document.getElementById('ask-input2').value = '';
    });
    document.getElementById('ask-input2').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('ask-btn2').click();
    });

    // ── Start polling ────────────────────────────────────────────
    poll();           setInterval(poll,          2000);
    pollThoughts();   setInterval(pollThoughts,  2000);
    pollSpeech();     setInterval(pollSpeech,    2000);
    pollResponses();  setInterval(pollResponses, 2000);
  </script>
</body>
</html>
