<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>DissipativeValue — Dashboard</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0a0f;
      color: #ccc;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .section {
      display: flex;
      flex-direction: column;
      padding: 0.8rem 1.5rem;
      border-bottom: 1px solid #111118;
      min-height: 0;
    }
    .section:last-child { border-bottom: none; }

    .section-label {
      font-size: 0.58rem;
      color: #2a2a3a;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      flex-shrink: 0;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
    }

    /* ── Section 1: Fluid ── */
    #s-fluid { flex: 2.2; }
    #canvas-wrap { flex: 1; min-height: 0; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }

    /* ── Section 2: Event ── */
    #s-event {
      flex: 1.6;
      transition: opacity 0.8s ease;
    }
    #event-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    #event-waiting {
      color: #1e1e2a;
      font-size: 0.75rem;
      text-align: center;
    }
    #event-card { display: none; }

    .event-meta {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.55rem;
    }
    .event-name  { font-size: 0.75rem; color: #999; }
    .event-phase {
      font-size: 0.58rem;
      color: #3a3a8a;
      background: #0d0d1e;
      border: 1px solid #2a2a66;
      padding: 2px 7px;
      border-radius: 3px;
    }
    .event-tick { font-size: 0.58rem; color: #222; }

    .weight-bar {
      display: flex;
      height: 26px;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 0.45rem;
    }
    .w-side {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      transition: width 0.4s ease;
      white-space: nowrap;
      overflow: hidden;
    }
    .w-chosen   { background: #1c1500; border: 1px solid #e8b840; color: #e8b840; }
    .w-unchosen { background: #0d0d14; border: 1px solid #161622; color: #2a2a3a; }

    #event-chose { font-size: 0.7rem; color: #e8b840; margin-bottom: 0.3rem; }
    #event-changes { font-size: 0.65rem; color: #2a4a2a; line-height: 1.7; }

    /* ── Section 3: World state ── */
    #s-world { flex: 1.4; }
    #vars-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
    }
    .var-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .var-name {
      font-size: 0.6rem;
      color: #333;
      width: 115px;
      flex-shrink: 0;
      text-align: right;
    }
    .var-track {
      flex: 1;
      height: 5px;
      background: #0d0d14;
      border-radius: 3px;
      overflow: hidden;
    }
    .var-fill {
      height: 100%;
      background: #1a3a6a;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .var-val {
      font-size: 0.6rem;
      color: #444;
      width: 42px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- ── Fluid ── -->
  <div class="section" id="s-fluid">
    <div class="section-label">
      <span>quantum fluid</span>
      <span id="tick-info">waiting...</span>
    </div>
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <!-- ── Last event ── -->
  <div class="section" id="s-event">
    <div class="section-label"><span>last event</span></div>
    <div id="event-body">
      <div id="event-waiting">waiting for next event...</div>
      <div id="event-card">
        <div class="event-meta">
          <span class="event-name"  id="ev-name"></span>
          <span class="event-phase" id="ev-phase"></span>
          <span class="event-tick"  id="ev-tick"></span>
        </div>
        <div class="weight-bar">
          <div class="w-side" id="w-a"></div>
          <div class="w-side" id="w-b"></div>
        </div>
        <div id="event-chose"></div>
        <div id="event-changes"></div>
      </div>
    </div>
  </div>

  <!-- ── World state ── -->
  <div class="section" id="s-world">
    <div class="section-label"><span>world state</span></div>
    <div id="vars-wrap">
      <div style="color:#1e1e2a;font-size:0.7rem;text-align:center" id="vars-empty">waiting...</div>
    </div>
  </div>

  <script>
    // ── Canvas ──────────────────────────────────────────────────
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const wrap    = document.getElementById('canvas-wrap');
    let   lastVM  = null;

    function resizeCanvas() {
      canvas.width  = wrap.clientWidth;
      canvas.height = wrap.clientHeight;
      if (lastVM) drawFluid(lastVM);
    }
    const ro = new ResizeObserver(resizeCanvas);
    ro.observe(wrap);

    const WELL_COLORS = { 128:'#4fc3f7', 384:'#81c784', 640:'#ffb74d', 896:'#f06292' };

    function smooth(rho, w) {
      return rho.map((_,i) => {
        let s=0,n=0;
        for (let j=Math.max(0,i-w); j<=Math.min(rho.length-1,i+w); j++) { s+=rho[j]; n++; }
        return s/n;
      });
    }

    function drawFluid(data) {
      const W=canvas.width, H=canvas.height;
      if (!W || !H) return;
      ctx.clearRect(0,0,W,H);

      const rho  = smooth(data.rho, 4);
      const maxR = Math.max(...rho) || 1;
      const PT=10, PB=18, gH=H-PT-PB;

      // Grid lines
      ctx.strokeStyle='#0f0f18'; ctx.lineWidth=1;
      for (let i=1;i<4;i++) {
        const y=PT+(gH/4)*i;
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
      }

      // Well markers
      for (const well of data.wells) {
        const x=(well.pos/1023)*W;
        const col=WELL_COLORS[well.pos]||'#666';
        ctx.strokeStyle=col; ctx.globalAlpha=0.18; ctx.lineWidth=1;
        ctx.setLineDash([3,6]);
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
        ctx.setLineDash([]); ctx.globalAlpha=0.35;
        ctx.fillStyle=col; ctx.font="8px 'Courier New'";
        ctx.fillText(well.name, x+3, H-3);
        ctx.globalAlpha=1;
      }

      // Fill under curve
      ctx.beginPath();
      ctx.moveTo(0,PT+gH);
      for (let i=0;i<rho.length;i++) {
        const x=(i/(rho.length-1))*W;
        const y=PT+gH-(rho[i]/maxR)*gH*0.88;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(W,PT+gH); ctx.closePath();
      const grad=ctx.createLinearGradient(0,PT,0,PT+gH);
      grad.addColorStop(0,'rgba(70,130,255,0.32)');
      grad.addColorStop(1,'rgba(70,130,255,0.02)');
      ctx.fillStyle=grad; ctx.fill();

      // Curve line
      ctx.beginPath(); ctx.strokeStyle='#5588ee'; ctx.lineWidth=1.5;
      for (let i=0;i<rho.length;i++) {
        const x=(i/(rho.length-1))*W;
        const y=PT+gH-(rho[i]/maxR)*gH*0.88;
        i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();

      // Center of mass dot
      let cSum=0, tSum=0;
      for (let i=0;i<rho.length;i++) { cSum+=i*rho[i]; tSum+=rho[i]; }
      const center=cSum/tSum;
      const cxPx=(center/1023)*W;
      const cIdx=Math.round(Math.min(Math.max(center,0),rho.length-1));
      const cyPx=PT+gH-(rho[cIdx]/maxR)*gH*0.88;
      ctx.beginPath(); ctx.arc(cxPx,cyPx,4,0,Math.PI*2);
      ctx.fillStyle='#fff'; ctx.globalAlpha=0.75; ctx.fill(); ctx.globalAlpha=1;

      // Arc position dots
      for (const arc of (data.arcs||[])) {
        const x=(arc.grid_pos/1023)*W;
        const idx=Math.min(Math.round(arc.grid_pos),rho.length-1);
        const y=PT+gH-(rho[idx]/maxR)*gH*0.88;
        ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
        ctx.fillStyle='#e8b840'; ctx.globalAlpha=0.85; ctx.fill(); ctx.globalAlpha=1;
      }
    }

    // ── Event section ───────────────────────────────────────────
    let lastEventTick = -1;
    let dimTimer      = null;

    function showEvent(ev) {
      if (ev.tick === lastEventTick) return;
      lastEventTick = ev.tick;

      document.getElementById('event-waiting').style.display = 'none';
      document.getElementById('event-card').style.display    = 'block';

      document.getElementById('ev-name').textContent  = ev.arc_name || ev.arc_id;
      document.getElementById('ev-phase').textContent = ev.phase.toUpperCase();
      document.getElementById('ev-tick').textContent  = 'tick ' + ev.tick;

      const wA = document.getElementById('w-a');
      const wB = document.getElementById('w-b');
      const aChosen = ev.chosen === 'A';
      wA.style.width    = ev.weight_A + '%';
      wB.style.width    = ev.weight_B + '%';
      wA.className      = 'w-side ' + (aChosen  ? 'w-chosen' : 'w-unchosen');
      wB.className      = 'w-side ' + (!aChosen ? 'w-chosen' : 'w-unchosen');
      wA.textContent    = 'A  ' + ev.weight_A + '%';
      wB.textContent    = 'B  ' + ev.weight_B + '%';

      document.getElementById('event-chose').textContent = '▶  chose ' + ev.chosen;

      const changesEl = document.getElementById('event-changes');
      changesEl.innerHTML = '';
      for (const c of (ev.changes || [])) {
        const d = document.createElement('div');
        d.textContent = c.var + ':  ' + c.before + '  →  ' + c.after;
        changesEl.appendChild(d);
      }

      document.getElementById('s-event').style.opacity = '1';
      if (dimTimer) clearTimeout(dimTimer);
      dimTimer = setTimeout(() => {
        document.getElementById('s-event').style.opacity = '0.3';
      }, 10000);
    }

    // ── World vars section ──────────────────────────────────────
    let builtVars = false;

    function updateVars(vars) {
      if (!vars || !Object.keys(vars).length) return;
      const keys = Object.keys(vars);
      const wrap = document.getElementById('vars-wrap');

      if (!builtVars) {
        builtVars = true;
        wrap.innerHTML = '';
        for (const k of keys) {
          wrap.innerHTML += `
            <div class="var-row">
              <span class="var-name">${k}</span>
              <div class="var-track"><div class="var-fill" id="vf-${k}"></div></div>
              <span class="var-val"  id="vv-${k}">—</span>
            </div>`;
        }
      }

      for (const k of keys) {
        const v   = vars[k];
        const pct = typeof v === 'number' ? Math.min(100, Math.max(0, v * 100)) : 0;
        const fEl = document.getElementById('vf-' + k);
        const vEl = document.getElementById('vv-' + k);
        if (fEl) fEl.style.width = pct + '%';
        if (vEl) vEl.textContent = typeof v === 'number' ? v.toFixed(3) : v;
      }
    }

    // ── Polling ─────────────────────────────────────────────────
    async function pollVM() {
      try {
        const res  = await fetch('/vm');
        const data = await res.json();
        if (data.rho && data.rho.length) {
          lastVM = data;
          resizeCanvas();
          drawFluid(data);
          const center = data.rho.reduce((s,v,i)=>s+i*v,0) / data.rho.reduce((s,v)=>s+v,0);
          document.getElementById('tick-info').textContent =
            'tick ' + data.tick + '  ·  center ' + Math.round(center);
          updateVars(data.world_vars);
        }
      } catch(_) {}
    }

    async function pollEvent() {
      try {
        const res  = await fetch('/event');
        const data = await res.json();
        if (data.tick !== undefined) showEvent(data);
      } catch(_) {}
    }

    pollVM();
    pollEvent();
    setInterval(pollVM,    1000);
    setInterval(pollEvent, 1000);
  </script>
</body>
</html>
