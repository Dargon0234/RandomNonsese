<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>entity</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #12121e;
      color: #ccc;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.55rem 1.2rem;
      border-bottom: 1px solid #0f0f1c;
      flex-shrink: 0;
    }
    #h-title { font-size: 0.65rem; color: #252535; letter-spacing: 0.18em; text-transform: uppercase; }
    #h-mood {
      font-size: 0.58rem;
      color: #2a2a3a;
      border: 1px solid #1a1a28;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.1em;
      transition: color 1s ease, border-color 1s ease;
    }
    #h-tick { font-size: 0.58rem; color: #161622; margin-left: auto; }
    #h-time { font-size: 0.58rem; color: #1e1e2e; letter-spacing: 0.1em; transition: color 2s ease; }

    /* World canvas */
    #world-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    #world { display: block; width: 100%; height: 100%; }

    /* Action */
    #action-bar {
      padding: 0.5rem 1.2rem;
      border-top: 1px solid #0f0f1c;
      font-size: 0.7rem;
      color: #2a2a3a;
      text-align: center;
      flex-shrink: 0;
      letter-spacing: 0.08em;
      transition: color 1s ease;
      min-height: 2rem;
    }

    /* Ask */
    #ask-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1.2rem;
      border-top: 1px solid #0f0f1c;
      flex-shrink: 0;
    }
    #ask-input {
      flex: 1;
      background: #0d0d18;
      border: 1px solid #1a1a2a;
      border-radius: 3px;
      color: #666;
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      padding: 0.3rem 0.6rem;
      outline: none;
      transition: border-color 0.3s ease, color 0.3s ease;
    }
    #ask-input:focus { border-color: #2a2a44; color: #999; }
    #ask-btn {
      background: none;
      border: 1px solid #1a1a2a;
      border-radius: 3px;
      color: #2a2a3a;
      font-family: 'Courier New', monospace;
      font-size: 0.6rem;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    #ask-btn:hover { color: #666; border-color: #333; }

    #reply-bar {
      padding: 0.4rem 1.2rem;
      border-top: 1px solid #0a0a14;
      font-size: 0.68rem;
      color: #1e1e2e;
      min-height: 1.8rem;
      flex-shrink: 0;
      line-height: 1.5;
      transition: color 1s ease;
    }
    #reply-q  { color: #1e1e2e; margin-right: 0.5rem; }
    #reply-a  { color: #2a2a3a; font-style: italic; }

    /* Drive bars */
    #drive-bar {
      display: flex;
      border-top: 1px solid #0f0f1c;
      flex-shrink: 0;
    }
    .drive {
      flex: 1;
      padding: 0.45rem 0.9rem 0.55rem;
      border-right: 1px solid #0f0f1c;
    }
    .drive:last-child { border-right: none; }
    .drive-label {
      font-size: 0.52rem;
      color: #1c1c2c;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.28rem;
      transition: color 1s ease;
    }
    .drive-track {
      height: 2px;
      background: #0d0d18;
      border-radius: 2px;
      overflow: hidden;
    }
    .drive-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1.2s ease;
      width: 0%;
    }
  </style>
</head>
<body>

  <header>
    <span id="h-title">entity</span>
    <span id="h-mood">waiting</span>
    <span id="h-time">—</span>
    <span id="h-tick">tick 0000</span>
  </header>

  <div id="world-wrap">
    <canvas id="world"></canvas>
  </div>

  <div id="action-bar">—</div>

  <div id="ask-bar">
    <input id="ask-input" type="text" placeholder="say something..." maxlength="120" autocomplete="off"/>
    <button id="ask-btn">ask</button>
  </div>

  <div id="reply-bar">
    <span id="reply-q"></span><span id="reply-a"></span>
  </div>

  <div id="drive-bar">
    <div class="drive" id="d-rest">
      <div class="drive-label">rest</div>
      <div class="drive-track"><div class="drive-fill" id="f-rest"    style="background:#4fc3f7"></div></div>
    </div>
    <div class="drive" id="d-explore">
      <div class="drive-label">explore</div>
      <div class="drive-track"><div class="drive-fill" id="f-explore" style="background:#e8b840"></div></div>
    </div>
    <div class="drive" id="d-decay">
      <div class="drive-label">decay</div>
      <div class="drive-track"><div class="drive-fill" id="f-decay"   style="background:#aa4466"></div></div>
    </div>
    <div class="drive" id="d-consume">
      <div class="drive-label">consume</div>
      <div class="drive-track"><div class="drive-fill" id="f-consume" style="background:#81c784"></div></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('world');
    const ctx    = canvas.getContext('2d');
    const wrap   = document.getElementById('world-wrap');

    const COLORS = {
      rest:    '#4fc3f7',
      explore: '#e8b840',
      decay:   '#aa4466',
      consume: '#81c784',
    };

    // Room layout — normalized positions for each drive's object
    const ZONES = {
      rest:    { nx: 0.14, ny: 0.60 },   // bed, left wall
      decay:   { nx: 0.72, ny: 0.78 },   // dark corner, floor right
      consume: { nx: 0.82, ny: 0.30 },   // shelf, right wall
    };

    // Entity state
    let ex = 0.5, ey = 0.5;
    let tx = 0.5, ty = 0.5;
    let activeDrive = 'explore';

    const trail = [];
    const TRAIL_MAX = 28;
    const LERP = 0.018;

    // Explore wander
    let exploreTX = 0.5, exploreTY = 0.5;
    let exploreTimer = 0;

    function newExploreTarget() {
      // Wander the open center of the room, avoiding furniture zones
      exploreTX = 0.28 + Math.random() * 0.44;
      exploreTY = 0.25 + Math.random() * 0.45;
    }

    function updateTarget() {
      if (activeDrive === 'explore') {
        tx = exploreTX;
        ty = exploreTY;
      } else if (ZONES[activeDrive]) {
        tx = ZONES[activeDrive].nx;
        ty = ZONES[activeDrive].ny;
      }
    }

    // Canvas resize
    function resize() {
      canvas.width  = wrap.clientWidth;
      canvas.height = wrap.clientHeight;
    }
    new ResizeObserver(resize).observe(wrap);
    resize();

    function drawRoom() {
      const W = canvas.width, H = canvas.height;

      // Floor
      ctx.fillStyle = '#16162a';
      ctx.fillRect(0, 0, W, H);

      // Floor boards
      ctx.strokeStyle = '#1e1e32';
      ctx.lineWidth = 1;
      const rows = 10;
      for (let i = 1; i < rows; i++) {
        const y = (H / rows) * i;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // Walls — left and right
      const wallW = W * 0.045;
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, wallW, H);
      ctx.fillRect(W - wallW, 0, wallW, H);

      // Ceiling line
      ctx.strokeStyle = '#252540';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, H * 0.05); ctx.lineTo(W, H * 0.05); ctx.stroke();

      // Baseboard
      ctx.strokeStyle = '#20203a';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, H * 0.94); ctx.lineTo(W, H * 0.94); ctx.stroke();
    }

    function drawBed(active) {
      const W = canvas.width, H = canvas.height;
      const cx = ZONES.rest.nx * W, cy = ZONES.rest.ny * H;
      const bw = W * 0.11, bh = H * 0.18;
      const col = COLORS.rest;
      const on  = active === 'rest';

      // Frame
      ctx.fillStyle   = col + (on ? '2a' : '14');
      ctx.strokeStyle = col + (on ? '55' : '28');
      ctx.lineWidth   = 1;
      roundRect(cx - bw/2, cy - bh/2, bw, bh, 3);

      // Pillow
      ctx.fillStyle   = col + (on ? '40' : '1e');
      ctx.strokeStyle = col + (on ? '60' : '2a');
      roundRect(cx - bw/2 + bw*0.08, cy - bh/2 + bh*0.1, bw*0.38, bh*0.35, 2);

      // Blanket line
      ctx.strokeStyle = col + (on ? '40' : '18');
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(cx - bw/2, cy + bh*0.05);
      ctx.lineTo(cx + bw/2, cy + bh*0.05);
      ctx.stroke();

      label(cx, cy + bh/2 + 12, 'rest', col, on);
    }

    function drawShelf(active) {
      const W = canvas.width, H = canvas.height;
      const cx = ZONES.consume.nx * W, cy = ZONES.consume.ny * H;
      const sw = W * 0.09, sh = H * 0.03;
      const col = COLORS.consume;
      const on  = active === 'consume';

      // Three shelves stacked
      for (let i = 0; i < 3; i++) {
        const y = cy - sh*3 + i * (sh + H*0.05);
        ctx.fillStyle   = col + (on ? '2e' : '16');
        ctx.strokeStyle = col + (on ? '55' : '28');
        ctx.lineWidth   = 1;
        roundRect(cx - sw/2, y, sw, sh, 1);

        // Items on shelf — small rectangles
        const itemCount = 2 + i;
        for (let j = 0; j < itemCount; j++) {
          const ix = cx - sw/2 + sw * (0.1 + j * (0.8/(itemCount)));
          ctx.fillStyle = col + (on ? '50' : '22');
          ctx.fillRect(ix, y - H*0.025, sw*0.12, H*0.025);
        }
      }

      label(cx, cy + sh + 14, 'consume', col, on);
    }

    function drawDecayCorner(active) {
      const W = canvas.width, H = canvas.height;
      const cx = ZONES.decay.nx * W, cy = ZONES.decay.ny * H;
      const col = COLORS.decay;
      const on  = active === 'decay';

      // Scattered lines — something coming apart
      ctx.strokeStyle = col + (on ? '50' : '25');
      ctx.lineWidth   = 1;
      const offsets = [
        [-18,-12,8,-4], [-8,-20,14,-8], [-22,2,4,10],
        [-4,-16,18,2],  [2,-6,-14,8],   [-16,10,6,18],
      ];
      for (const [x1,y1,x2,y2] of offsets) {
        ctx.beginPath();
        ctx.moveTo(cx+x1, cy+y1);
        ctx.lineTo(cx+x2, cy+y2);
        ctx.stroke();
      }

      // Glow underneath
      const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28);
      grd.addColorStop(0, col + (on ? '2e' : '12'));
      grd.addColorStop(1, col + '00');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(cx, cy, 28, 0, Math.PI*2); ctx.fill();

      label(cx, cy + 30, 'decay', col, on);
    }


    // Helpers
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
      ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
      ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
      ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }

    function label(x, y, text, col, active) {
      ctx.fillStyle  = col + (active ? '99' : '44');
      ctx.font       = "9px 'Courier New'";
      ctx.textAlign  = 'center';
      ctx.fillText(text, x, y);
    }

    function drawTrail() {
      for (let i = 0; i < trail.length; i++) {
        const t     = trail[i];
        const frac  = i / trail.length;
        const alpha = Math.floor(frac * frac * 60).toString(16).padStart(2, '0');
        ctx.beginPath();
        ctx.arc(t.x, t.y, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = (COLORS[activeDrive] || '#fff') + alpha;
        ctx.fill();
      }
    }

    function drawEntity() {
      const W   = canvas.width, H = canvas.height;
      const px  = ex * W, py = ey * H;
      const col = COLORS[activeDrive] || '#ffffff';

      // Outer glow
      const grd = ctx.createRadialGradient(px, py, 0, px, py, 24);
      grd.addColorStop(0, col + '3a');
      grd.addColorStop(1, col + '00');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(px, py, 24, 0, Math.PI * 2);
      ctx.fill();

      // Core dot
      ctx.beginPath();
      ctx.arc(px, py, 4.5, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.fill();

      // Bright center
      ctx.beginPath();
      ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff60';
      ctx.fill();
    }

    // ── Day / night cycle ───────────────────────────────────────
    const CYCLE_MS = 4 * 60 * 1000; // 4-minute full cycle

    // Key moments in the cycle (t = 0 to 1)
    const SKY_STOPS = [
      { t: 0.00, r:255, g:120, b: 60, intensity: 0.55, label: 'dawn'    },
      { t: 0.20, r:255, g:200, b:120, intensity: 0.90, label: 'morning' },
      { t: 0.35, r:180, g:200, b:255, intensity: 1.00, label: 'noon'    },
      { t: 0.55, r:255, g:140, b: 60, intensity: 0.75, label: 'dusk'    },
      { t: 0.70, r:120, g: 60, b:140, intensity: 0.30, label: 'evening' },
      { t: 0.85, r: 20, g: 20, b: 60, intensity: 0.05, label: 'night'   },
      { t: 1.00, r:255, g:120, b: 60, intensity: 0.55, label: 'dawn'    },
    ];

    function getSky() {
      const t = (Date.now() % CYCLE_MS) / CYCLE_MS;
      let prev = SKY_STOPS[SKY_STOPS.length - 2];
      let next = SKY_STOPS[SKY_STOPS.length - 1];
      for (let i = 0; i < SKY_STOPS.length - 1; i++) {
        if (t >= SKY_STOPS[i].t && t < SKY_STOPS[i+1].t) {
          prev = SKY_STOPS[i]; next = SKY_STOPS[i+1]; break;
        }
      }
      const span = next.t - prev.t || 1;
      const f    = (t - prev.t) / span;
      return {
        r:         Math.round(prev.r + (next.r - prev.r) * f),
        g:         Math.round(prev.g + (next.g - prev.g) * f),
        b:         Math.round(prev.b + (next.b - prev.b) * f),
        intensity: prev.intensity + (next.intensity - prev.intensity) * f,
        t,
        label: t < 0.20 ? 'dawn' : t < 0.35 ? 'morning' :
               t < 0.55 ? 'noon' : t < 0.70 ? 'dusk'    :
               t < 0.85 ? 'evening' : 'night',
      };
    }

    function drawAmbientOverlay(sky) {
      const W = canvas.width, H = canvas.height;
      const night = 1 - sky.intensity;
      if (night > 0.1) {
        // Night darkens the room
        ctx.fillStyle = `rgba(0,0,12,${night * 0.55})`;
        ctx.fillRect(0, 0, W, H);
      }
      if (sky.intensity > 0.4 && sky.t < 0.55) {
        // Day adds a warm tint
        const warm = (sky.intensity - 0.4) * 0.12;
        ctx.fillStyle = `rgba(${sky.r},${sky.g*0.7|0},${sky.b*0.3|0},${warm})`;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawWindowWithSky(sky) {
      const W  = canvas.width, H = canvas.height;
      const cx = W * 0.5,  cy = H * 0.12;
      const ww = W * 0.12, wh = H * 0.10;
      const { r, g, b, intensity, t } = sky;

      // Sky fill inside window
      ctx.globalAlpha = Math.min(1, intensity * 0.5 + 0.08);
      ctx.fillStyle   = `rgb(${r},${g},${b})`;
      ctx.fillRect(cx - ww/2 + 1, cy - wh/2 + 1, ww - 2, wh - 2);
      ctx.globalAlpha = 1;

      // Sun or moon — arcs across the window left→right over the cycle
      const isDay  = t < 0.70;
      const bodyT  = isDay ? t / 0.70 : (t - 0.70) / 0.30;
      const bodyX  = (cx - ww/2 + 4) + (ww - 8) * bodyT;
      const arcY   = Math.sin(bodyT * Math.PI);
      const bodyY  = (cy + wh/2 - 4) - (wh - 8) * arcY;

      if (isDay) {
        const sunAlpha = intensity;
        const grd = ctx.createRadialGradient(bodyX, bodyY, 0, bodyX, bodyY, 12);
        grd.addColorStop(0, `rgba(${r},${g},${b},${sunAlpha})`);
        grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(bodyX, bodyY, 12, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(bodyX, bodyY, 4, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,240,200,${sunAlpha * 0.9})`; ctx.fill();
      } else {
        // Moon
        const moonA = (1 - intensity) * 0.7;
        ctx.beginPath(); ctx.arc(bodyX, bodyY, 4, 0, Math.PI*2);
        ctx.fillStyle = `rgba(200,210,255,${moonA})`; ctx.fill();

        // Stars scattered in window
        const starPositions = [[0.15,0.2],[0.75,0.15],[0.35,0.7],[0.85,0.55],[0.55,0.35]];
        for (const [sx, sy] of starPositions) {
          const stx = cx - ww/2 + ww * sx;
          const sty = cy - wh/2 + wh * sy;
          ctx.beginPath(); ctx.arc(stx, sty, 1, 0, Math.PI*2);
          ctx.fillStyle = `rgba(200,210,255,${moonA * 0.8})`; ctx.fill();
        }
      }

      // Light spill into room — color and size follows intensity
      const spillR = ww * (1.5 + intensity * 1.5);
      const grd = ctx.createRadialGradient(cx, cy + wh/2, 0, cx, cy + wh/2, spillR);
      grd.addColorStop(0, `rgba(${r},${g},${b},${intensity * 0.18})`);
      grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(cx, cy + wh/2, spillR, 0, Math.PI*2); ctx.fill();

      // Frame
      ctx.strokeStyle = '#2e2e50'; ctx.lineWidth = 1.5;
      ctx.strokeRect(cx - ww/2, cy - wh/2, ww, wh);
      ctx.beginPath();
      ctx.moveTo(cx, cy - wh/2); ctx.lineTo(cx, cy + wh/2);
      ctx.moveTo(cx - ww/2, cy); ctx.lineTo(cx + ww/2, cy);
      ctx.stroke();
    }

    // Thought state
    let thoughtText  = "";
    let thoughtTick  = -1;
    let thoughtPhase = 0;   // 0=idle 1=fadein 2=hold 3=fadeout
    let thoughtAge   = 0;
    let thoughtAlpha = 0;
    const T_FADEIN  = 40;
    const T_HOLD    = 220;
    const T_FADEOUT = 120;

    function triggerThought(text) {
      thoughtText  = text;
      thoughtPhase = 1;
      thoughtAge   = 0;
      thoughtAlpha = 0;
    }

    function stepThought() {
      if (thoughtPhase === 0) return;
      thoughtAge++;
      if (thoughtPhase === 1) {
        thoughtAlpha = thoughtAge / T_FADEIN;
        if (thoughtAge >= T_FADEIN) { thoughtPhase = 2; thoughtAge = 0; }
      } else if (thoughtPhase === 2) {
        thoughtAlpha = 1.0;
        if (thoughtAge >= T_HOLD) { thoughtPhase = 3; thoughtAge = 0; }
      } else if (thoughtPhase === 3) {
        thoughtAlpha = 1.0 - thoughtAge / T_FADEOUT;
        if (thoughtAge >= T_FADEOUT) { thoughtPhase = 0; thoughtAlpha = 0; thoughtText = ""; }
      }
    }

    function drawThought(W, H) {
      if (!thoughtText || thoughtAlpha <= 0) return;
      const col = COLORS[activeDrive] || '#888';
      const y   = H * 0.12;

      // Wrap text at ~55 chars
      const words = thoughtText.split(' ');
      const lines = [];
      let line = '';
      for (const w of words) {
        if ((line + ' ' + w).trim().length > 55) { lines.push(line.trim()); line = w; }
        else line = (line + ' ' + w).trim();
      }
      if (line) lines.push(line);

      ctx.globalAlpha = thoughtAlpha * 0.75;
      ctx.font        = "12px 'Courier New'";
      ctx.textAlign   = 'center';
      ctx.fillStyle   = col;
      lines.forEach((l, i) => ctx.fillText(l, W / 2, y + i * 18));
      ctx.globalAlpha = 1;
    }

    let frame = 0;

    function animate() {
      frame++;
      const W = canvas.width, H = canvas.height;

      // Explore wander — pick new waypoint every ~1.5–3s at 60fps
      if (activeDrive === 'explore') {
        exploreTimer--;
        if (exploreTimer <= 0) {
          newExploreTarget();
          exploreTimer = 90 + Math.floor(Math.random() * 90);
        }
      }

      updateTarget();

      ex += (tx - ex) * LERP;
      ey += (ty - ey) * LERP;

      // Record trail every 3 frames
      if (frame % 3 === 0) {
        trail.push({ x: ex * W, y: ey * H });
        if (trail.length > TRAIL_MAX) trail.shift();
      }

      // Draw room + furniture
      const sky = getSky();
      drawRoom();
      drawAmbientOverlay(sky);
      drawWindowWithSky(sky);
      drawBed(activeDrive);
      drawShelf(activeDrive);
      drawDecayCorner(activeDrive);

      // Update time-of-day label in header
      const timeEl = document.getElementById('h-time');
      if (timeEl && timeEl.textContent !== sky.label) {
        timeEl.textContent  = sky.label;
        const sc = `rgb(${sky.r},${sky.g},${sky.b})`;
        timeEl.style.color  = sky.intensity > 0.3 ? sc : '#2a2a44';
      }
      drawTrail();
      drawEntity();
      stepThought();
      drawThought(W, H);

      requestAnimationFrame(animate);
    }
    animate();

    // ── UI helpers ──────────────────────────────────────────────────
    function setDriveHighlight(active) {
      for (const name of ['rest', 'explore', 'decay', 'consume']) {
        const label = document.querySelector(`#d-${name} .drive-label`);
        if (label) label.style.color = name === active
          ? (COLORS[name] + 'bb')
          : '#1c1c2c';
      }
    }

    const MOOD_COLORS = {
      calm:      '#1e3020',
      driven:    '#1e2840',
      unsettled: '#302020',
      restless:  '#282018',
      scattered: '#301818',
    };

    // ── Polling ─────────────────────────────────────────────────────
    let lastTick = -1;

    async function poll() {
      try {
        const res  = await fetch('/npc');
        const data = await res.json();
        if (!data.tick || data.tick === lastTick) return;
        lastTick = data.tick;

        // Drive switch
        if (data.active && data.active !== activeDrive) {
          activeDrive = data.active;
          setDriveHighlight(activeDrive);
          exploreTimer = 0; // pick new explore target immediately if switching to explore
        }

        // Header
        const moodEl = document.getElementById('h-mood');
        moodEl.textContent    = data.mood || '—';
        moodEl.style.color    = MOOD_COLORS[data.mood] ?
          adjustBrightness(MOOD_COLORS[data.mood], 2.5) : '#2a2a3a';
        moodEl.style.borderColor = MOOD_COLORS[data.mood] || '#1a1a28';

        document.getElementById('h-tick').textContent =
          'tick ' + String(data.tick).padStart(4, '0');

        // Action
        const actionEl = document.getElementById('action-bar');
        actionEl.textContent = data.action || '—';
        actionEl.style.color = (COLORS[activeDrive] || '#444') + '80';

        // Drive bars
        const drives = data.drives || {};
        for (const [name, sat] of Object.entries(drives)) {
          const el = document.getElementById('f-' + name);
          if (el) el.style.width = Math.round(sat * 100) + '%';
        }

      } catch (_) {}
    }

    // Lighten a hex bg color for text readability
    function adjustBrightness(hex, factor) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      const clamp = v => Math.min(255, Math.round(v * factor));
      return `rgb(${clamp(r)},${clamp(g)},${clamp(b)})`;
    }

    setDriveHighlight('explore');
    poll();
    setInterval(poll, 2000);

    // ── Ask / response ──────────────────────────────────────────
    let lastResponseTick = -1;

    async function sendQuestion(q) {
      await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question: q}),
      });
      document.getElementById('reply-q').textContent = q;
      document.getElementById('reply-a').textContent = '  ...';
    }

    async function pollResponse() {
      try {
        const res  = await fetch('/response');
        const data = await res.json();
        if (data.tick && data.tick !== lastResponseTick && data.response) {
          lastResponseTick = data.tick;
          const col = (COLORS[activeDrive] || '#666') + '99';
          document.getElementById('reply-q').textContent = '"' + data.question + '"';
          document.getElementById('reply-q').style.color = '#252535';
          const replyA = document.getElementById('reply-a');
          replyA.textContent = '  ' + data.response;
          replyA.style.color = col;
        }
      } catch(_) {}
    }

    document.getElementById('ask-btn').addEventListener('click', () => {
      const q = document.getElementById('ask-input').value.trim();
      if (!q) return;
      sendQuestion(q);
      document.getElementById('ask-input').value = '';
    });

    document.getElementById('ask-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('ask-btn').click();
    });

    pollResponse();
    setInterval(pollResponse, 2000);

    async function pollThought() {
      try {
        const res  = await fetch('/thought');
        const data = await res.json();
        if (data.tick && data.tick !== thoughtTick && data.text) {
          thoughtTick = data.tick;
          triggerThought(data.text);
        }
      } catch(_) {}
    }

    pollThought();
    setInterval(pollThought, 2000);
  </script>
</body>
</html>
